name: ci - docker-build

on:
  workflow_call:
    inputs:
      docker_build_matrix:
        description: "Json matrix for docker build"
        required: true
        type: string
      docker_build_platforms:
        description: "Json matrix for docker build"
        required: true
        type: string

jobs:
  docker-build:
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(inputs.docker_build_matrix) }}

    env:
      GHCR_REPO: ghcr.io/${{ github.repository }}
      DOCKERHUB_REPO: ${{ github.repository }}
      DOCKER_BUILD_SUMMARY: "false"
      arch_type: ${{ matrix.arch_type.name }}
      qbt_cross_name: ${{ matrix.arch_type.qbt_cross_name }}
      docker_build_platforms: ${{ inputs.docker_build_platforms }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: |
            ${{ env.GHCR_REPO }}
            ${{ env.DOCKERHUB_REPO }}

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          cache-binary: false

      - name: Build and push by digest
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          provenance: false
          platforms: ${{ env.docker_build_platforms }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ env.GHCR_REPO }}:${{ env.arch_type }}
          no-cache: true
          build-args: |
            ARCH=${{ env.arch_type }}
            BASE_URL=https://github.com/${{ github.repository }}/releases/latest/download
            QBT_CROSS_NAME=${{ env.qbt_cross_name }}
            GH_REPO=${{ github.repository }}
            GH_REPO_NAME=${{ github.event.repository.name }}
