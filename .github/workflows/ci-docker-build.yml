name: ci - docker-build

on:
  workflow_call:
    inputs:
      docker_build_matrix:
        description: "Json matrix for docker build"
        required: true
        type: string
      docker_build_platforms:
        description: "Json matrix for docker build"
        required: true
        type: string

jobs:
  docker-build:
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(inputs.docker_build_matrix) }}

    env:
      GHCR_REPO: ghcr.io/${{ github.repository }}
      DOCKERHUB_REPO: ${{ github.repository }}
      DOCKER_BUILD_SUMMARY: "false"
      arch_type: ${{ matrix.arch_type.name }}
      qbt_cross_name: ${{ matrix.arch_type.qbt_cross_name }}
      docker_build_platforms: ${{ inputs.docker_build_platforms }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ${{ env.GHCR_REPO }}
            ${{ env.DOCKERHUB_REPO }}

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          cache-binary: false

      - name: Build and push by digest
        id: push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          provenance: false
          platforms: ${{ env.docker_build_platforms }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ env.GHCR_REPO }}:${{ env.arch_type }}
          no-cache: true
          build-args: |
            ARCH=${{ env.arch_type }}
            BASE_URL=https://github.com/${{ github.repository }}/releases/latest/download
            QBT_CROSS_NAME=${{ env.qbt_cross_name }}
