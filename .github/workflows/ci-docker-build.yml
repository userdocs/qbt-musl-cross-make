name: ci - docker-build

on:
  workflow_call:
    inputs:
      docker_build_matrix:
        description: "Json matrix for docker build"
        required: true
        type: string
      docker_build_platforms:
        description: "Json matrix for docker build"
        required: true
        type: string

jobs:
  docker-build:
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(inputs.docker_build_matrix) }}

    env:
      GHCR_REPO: ghcr.io/${{ github.repository }}
      DOCKERHUB_REPO: ${{ github.repository }}
      DOCKER_BUILD_SUMMARY: "false"
      arch_type: ${{ matrix.arch_type.name }}
      qbt_cross_name: ${{ matrix.arch_type.qbt_cross_name }}
      docker_build_platforms: ${{ inputs.docker_build_platforms }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ${{ env.GHCR_REPO }}
            ${{ env.DOCKERHUB_REPO }}

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          cache-binary: false

      - name: Build and push by digest
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          provenance: false
          platforms: ${{ env.docker_build_platforms }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ env.GHCR_REPO }}:${{ env.arch_type }}
          no-cache: true
          build-args: |
            ARCH=${{ env.arch_type }}
            BASE_URL=https://github.com/${{ github.repository }}/releases/latest/download
            QBT_CROSS_NAME=${{ env.qbt_cross_name }}
            GH_REPO=${{ github.repository }}
            GH_REPO_NAME=${{ github.event.repository.name }}
