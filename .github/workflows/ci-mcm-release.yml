name: ci - toolchain release

on:
  workflow_call:

jobs:
  toolchain-release:
    name: toolchain release
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Host - Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: toolchains
          pattern: "*-toolchain"
          merge-multiple: true

      - name: set release info from versions.mak
        run: |
          printf '%b' '| Dependency | Version |\n|:---|:---|\n' > release_body.md;
          grep -v '^#' versions.mak | grep -v '^\s*$' | sed -E 's/ *([^ =]+) *= *(.*)/| `\1` | `\2` |/' >> release_body.md

      - name: set tag via date
        run: printf '%s\n' "github_tag=$(date +"%y%V")" >> $GITHUB_ENV

      - name: Create release - tag - assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Try to create the release. If it already exists, update it and replace assets.
          gh release create "${github_tag}" \
            --title "musl-cross-make toolchains" \
            --notes-file release_body.md \
            --latest \
            toolchains/*.tar.xz versions.json || {
            gh release edit "${github_tag}" \
              --title "musl-cross-make toolchains" \
              --notes-file release_body.md \
              --latest
            gh release upload "${github_tag}" \
              --clobber \
              toolchains/*.tar.xz versions.json
          }
